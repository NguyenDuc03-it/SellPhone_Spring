spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.tomcat.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show_sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.show_sql=true

spring.jpa.hibernate.ddl-auto=update

spring.jpa.properties.hibernate.type=trace

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

spring.application.name=SellPhone

vnpay.tmn-code= ${VNPAY_TMN_CODE}
vnpay.hash-secret= ${VNPAY_HASH_SECRET}
vnpay.pay-url= ${VNPAY_PAY_URL}

#JavaMailSender config
#Sau khi bao ve xong th� mat khau ung dung n�y se bi x�a khoi mail, khong the dung mat khau nay de truy cap gui mail nua
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

#OpenAI KEY
openai.api-key = ${OPENAI_API_KEY}

#Redis config
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.timeout=6000
