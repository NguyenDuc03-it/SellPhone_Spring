<!doctype html>
<html class="no-js" lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta http-equiv="x-ua-compatible" content="ie=edge">
  <title>Admin Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="shortcut icon" type="image/png" href="../../static/assets/images/icon/favicon.ico" th:href="@{/assets/images/icon/favicon.ico}">
  <link rel="stylesheet" href="../../static/assets/css/bootstrap.min.css" th:href="@{/assets/css/bootstrap.min.css}">
  <link rel="stylesheet" href="../../static/assets/css/font-awesome.min.css" th:href="@{/assets/css/font-awesome.min.css}">
  <link rel="stylesheet" href="../../static/assets/css/themify-icons.css" th:href="@{/assets/css/themify-icons.css}">
  <link rel="stylesheet" href="../../static/assets/css/metisMenu.css" th:href="@{/assets/css/metisMenu.css}">
  <link rel="stylesheet" href="../../static/assets/css/owl.carousel.min.css" th:href="@{/assets/css/owl.carousel.min.css}">
  <link rel="stylesheet" href="../../static/assets/css/slicknav.min.css" th:href="@{/assets/css/slicknav.min.css}">
  <link rel="stylesheet" href="assets/css/admin-profile.css" th:href="@{/assets/css/admin-profile.css}">
  <!-- amchart css -->
  <link rel="stylesheet" href="https://www.amcharts.com/lib/3/plugins/export/export.css" type="text/css" media="all" />
  <!-- others css -->
  <link rel="stylesheet" href="../../static/assets/css/typography.css" th:href="@{/assets/css/typography.css}">
  <link rel="stylesheet" href="../../static/assets/css/default-css.css" th:href="@{/assets/css/default-css.css}">
  <link rel="stylesheet" href="../../static/assets/css/styles.css" th:href="@{/assets/css/styles.css}">
  <link rel="stylesheet" href="../../static/assets/css/responsive.css" th:href="@{/assets/css/responsive.css}">
  <!-- modernizr css -->
  <script src="assets/js/vendor/modernizr-2.8.3.min.js"></script>
  <script src="assets/js/admin-profile.js" th:src="@{/assets/js/admin-profile.js}" defer></script>
</head>

<body>

<!-- preloader area start -->
<div id="preloader">
  <div class="loader"></div>
</div>

<!-- Thông báo thành công với thanh tiến trình -->
<div id="successNotification" class="alert alert-success" th:if="${successMessage}">
  <strong>Thành công!</strong><br>
  <span th:text="${successMessage}"></span>
  <div id="progressBar" class="progress mt-2" style="height: 5px;">
    <div id="progress" class="progress-bar bg-success" role="progressbar" style="width: 100%;"></div>
  </div>
</div>

<!-- Thông báo thất bại với thanh tiến trình -->
<div id="errorNotification" class="alert alert-danger" th:if="${errorMessage}">
  <strong>Thất bại!</strong><br>
  <span th:text="${errorMessage}"></span>
  <div id="errorProgressBar" class="progress mt-2" style="height: 5px;">
    <div id="errorProgress" class="progress-bar bg-danger" role="progressbar" style="width: 100%;"></div>
  </div>
</div>


<!-- preloader area end -->
<!-- page container area start -->
<div class="page-container">
  <!-- sidebar menu area start -->
  <div th:replace="~{Fragments/sidebar :: *}"></div>
  <!-- sidebar menu area end -->
  <!-- main content area start -->
  <div class="main-content">
    <!-- header area start -->
    <div th:replace="~{Fragments/header :: *}"></div>
    <!-- header area end -->
    <!-- page title area start -->
    <div class="page-title-area">
      <div class="row align-items-center">
        <div class="col-sm-6">
          <div class="breadcrumbs-area clearfix">
            <h4 class="page-title pull-left">Thông Tin Cá Nhân</h4>
            <ul class="breadcrumbs pull-left">
              <li><a href="/management/dashboard">Trang chủ</a></li>
              <li><span>Thông tin cá nhân</span></li>
            </ul>
          </div>
        </div>
        <div class="col-sm-6 clearfix">
          <div class="user-profile pull-right">
            <img class="avatar user-thumb" th:src="@{/assets/images/author/avatar.png}" alt="avatar">
            <h4 class="user-name dropdown-toggle" data-toggle="dropdown" th:text="${user.fullname}"><i class="fa fa-angle-down"></i></h4>
            <div class="dropdown-menu" style="right: 0px !important; left: 0px !important; width:100%;">
              <a class="dropdown-item" href="/management/profile">Thông tin cá nhân</a>
              <a class="dropdown-item" href="/logout">Đăng xuất</a>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- page title area end -->
    <div class="main-content-inner">
      <div class="row mt-5">
        <div class="col-lg-4">
          <div class="card">
            <div class="card-body">
              <div class="text-center">
                <img th:src="@{/assets/images/author/avatar.png}" class="rounded-circle" alt="avatar" width="150">
                <h4 class="card-title mt-3" th:text="${user.fullname}">Admin Name</h4>
                <p class="card-text text-muted" th:text="${user.email}">admin@example.com</p>
                <div class="nav flex-column nav-pills mt-4" id="v-pills-tab" role="tablist" aria-orientation="vertical">
                  <a class="nav-link active" id="v-pills-info-tab" data-toggle="pill" href="#v-pills-info" role="tab" aria-controls="v-pills-info" aria-selected="true">
                    <i class="ti-user mr-2"></i> Thông tin tài khoản
                  </a>
                  <a class="nav-link" id="v-pills-password-tab" data-toggle="pill" href="#v-pills-password" role="tab" aria-controls="v-pills-password" aria-selected="false">
                    <i class="ti-lock mr-2"></i> Đổi mật khẩu
                  </a>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="col-lg-8">
          <div class="card">
            <div class="card-body">
              <div class="tab-content" id="v-pills-tabContent">
                <!-- Account Info Tab -->
                <div class="tab-pane fade show active" id="v-pills-info" role="tabpanel" aria-labelledby="v-pills-info-tab">
                  <form id="profileForm" th:action="@{/management/profile/update-info}" method="post" th:object="${user}">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                      <h4 class="header-title mb-0">Thông Tin Tài Khoản</h4>
                      <div id="info-buttons">
                        <button type="button" class="btn btn-primary" id="editBtn">Chỉnh sửa</button>
                        <button type="submit" class="btn btn-success" style="display:none;" id="saveBtn" onclick="this.disabled=true; this.innerHTML='<i class=\'fas fa-spinner fa-spin\'></i> Đang lưu...'; this.form.submit();">Lưu</button>
                        <button type="button" class="btn btn-light" style="display:none;" id="cancelBtn">Hủy</button>
                      </div>
                    </div>

                      <input type="hidden" name="userId" th:value="${user.userId}" />
                    <input type="hidden" name="email" th:value="${user.email}" />
                      <div class="form-row">
                        <div class="form-group col-md-6">
                          <label for="fullName">Họ và tên</label>
                          <input type="text" id="fullname" name="fullname" th:value="${user.fullname}" required
                                 class="form-control"
                                 oninvalid="this.setCustomValidity('Họ và tên không được để trống')"
                                 oninput="this.setCustomValidity('')" disabled>
                          <div th:if="${#fields.hasErrors('fullname')}" class="error text-danger mb-2 text-start">
                            <small th:errors="*{fullname}">Lỗi</small>
                          </div>
                        </div>
                        <div class="form-group col-md-6">
                          <label for="staffId">Mã nhân viên</label>
                          <input type="text" class="form-control" id="staffId" th:value="${user.userId}" disabled>
                        </div>
                      </div>
                      <div class="form-row">
                        <div class="form-group col-md-6">
                          <label for="phone">Số điện thoại</label>
                          <input type="tel" id="phone" name="phone" th:value="${user.phone}"
                                 class="form-control"
                                 pattern="^(\+84|0)[0-9]{9}$" required
                                 oninvalid="this.setCustomValidity('Số điện thoại không hợp lệ, bắt đầu +84 hoặc 0 và 10 chữ số')"
                                 oninput="this.setCustomValidity('')" disabled>
                          <div th:if="${#fields.hasErrors('phone')}" class="error text-danger mb-2 text-start">
                            <small th:errors="*{phone}">Lỗi</small>
                          </div>
                        </div>
                        <div class="form-group col-md-6">
                          <label for="dob">Ngày sinh</label>
                          <input type="date" id="dob" name="dob" th:value="${user.dob}" required
                                 class="form-control"
                                 oninvalid="this.setCustomValidity('Ngày sinh không được để trống')"
                                 oninput="this.setCustomValidity('')" disabled>
                          <div th:if="${#fields.hasErrors('dob')}" class="error text-danger mb-2 text-start">
                            <small th:errors="*{dob}">Lỗi</small>
                          </div>
                        </div>
                      </div>
                      <div class="form-row">
                        <div class="form-group col-md-6">
                          <label>CCCD</label>
                          <input type="text" id="CCCD" name="CCCD" th:value="${user.CCCD}" pattern="^[0-9]{12}$" required
                                 class="form-control"
                                 oninvalid="this.setCustomValidity('CCCD chỉ gồm 12 chữ số')"
                                 oninput="this.setCustomValidity('')" disabled>
                          <div th:if="${#fields.hasErrors('CCCD')}" class="error text-danger mb-2 text-start">
                            <small th:errors="*{CCCD}">Lỗi</small>
                          </div>
                        </div>
                        <div class="form-group col-md-6">
                          <label>Giới tính</label>
                          <select id="gender" name="gender" class="form-control" style="height: 2.7rem;" required disabled>
                            <option value="">-- Chọn giới tính --</option>
                            <option value="Nam" th:selected="${user.gender == 'Nam'}">Nam</option>
                            <option value="Nữ" th:selected="${user.gender == 'Nữ'}">Nữ</option>
                            <option value="Khác" th:selected="${user.gender == 'Khác'}">Khác</option>
                          </select>
                        </div>
                      </div>
                      <div class="form-group">
                        <label for="address">Địa chỉ</label>
                        <input type="text" id="address" name="address" th:value="${user.address}" required
                               class="form-control"
                               pattern="^[\\p{L}\\s,\\.\\-0-9]+$"
                               oninvalid="this.setCustomValidity('Địa chỉ không hợp lệ')"
                               oninput="this.setCustomValidity('')" disabled>
                        <div th:if="${#fields.hasErrors('address')}" class="error text-danger mb-2 text-start">
                          <small th:errors="*{address}">Lỗi</small>
                        </div>
                      </div>
                  </form>
                </div>
                <!-- Change Password Tab -->
                <div class="tab-pane fade" id="v-pills-password" role="tabpanel" aria-labelledby="v-pills-password-tab">
                  <h4 class="header-title mb-4">Đổi Mật Khẩu</h4>
                  <form id="changePasswordForm" th:action="@{/management/profile/change-password}" method="post">
                    <div class="form-group">
                      <label for="currentPassword">Mật khẩu hiện tại</label>
                      <input type="password" class="form-control" name="currentPassword" id="currentPassword" placeholder="Nhập mật khẩu hiện tại" th:value="${currentPasswordSave}" required>
                      <small id="passwordMessage" style="color: red;" th:if="${errorMessage}" th:text="${errorMessage}"></small>
                    </div>
                    <div class="form-group">
                      <label for="newPassword">Mật khẩu mới</label>
                      <input type="password" class="form-control" id="newPassword" placeholder="Nhập mật khẩu mới" name="newPassword" th:value="${newPasswordSave}" required>
                      <small id="newPasswordMessage" style="color: red;" th:if="${newPasswordMessage}" th:text="${newPasswordMessage}"></small>
                    </div>
                    <div class="form-group">
                      <label for="confirmPassword">Xác nhận mật khẩu mới</label>
                      <input type="password" class="form-control" id="confirmPassword" placeholder="Xác nhận lại mật khẩu mới" name="confirmPassword" required>
                      <small id="passwordMatchMessage" style="color: red; display: none;">Mật khẩu xác nhận không khớp</small> <!-- xử lý hiển thị trong js -->
                    </div>
                    <button type="submit" class="btn btn-primary mt-3">Cập nhật mật khẩu</button>
                  </form>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <!-- main content area end -->
  <!-- footer area start-->
  <div th:replace="~{Fragments/footer :: *}"></div>
  <!-- footer area end-->
</div>
<!-- page container area end -->

<!-- jquery latest version -->
<script src="../../static/assets/js/vendor/jquery-2.2.4.min.js" th:src="@{/assets/js/vendor/jquery-2.2.4.min.js}"></script>
<!-- bootstrap 4 js -->
<script src="../../static/assets/js/popper.min.js" th:src="@{/assets/js/popper.min.js}"></script>
<script src="../../static/assets/js/bootstrap.min.js" th:src="@{/assets/js/bootstrap.min.js}"></script>
<script src="../../static/assets/js/owl.carousel.min.js" th:src="@{/assets/js/owl.carousel.min.js}"></script>
<script src="../../static/assets/js/metisMenu.min.js" th:src="@{/assets/js/metisMenu.min.js}"></script>
<script src="../../static/assets/js/jquery.slimscroll.min.js" th:src="@{/assets/js/jquery.slimscroll.min.js}"></script>
<script src="../../static/assets/js/jquery.slicknav.min.js" th:src="@{/assets/js/jquery.slicknav.min.js}"></script>
<!-- others plugins -->
<script src="../../static/assets/js/plugins.js" th:src="@{/assets/js/plugins.js}"></script>
<script src="../../static/assets/js/scripts.js" th:src="@{/assets/js/scripts.js}"></script>

<!-- Script for success notification -->
<script th:inline="javascript">
  /*<![CDATA[*/
  var successMessage = /*[[${successMessage}]]*/ 'null';
  if (successMessage !== 'null') {
      var successNotification = document.getElementById('successNotification');
      var successProgressBar = document.getElementById('progress');
      var successProgress = 100; // Initial value of the progress bar

      // Display the notification
      successNotification.style.display = 'block';

      // Progress bar decreases from 100% to 0%
      var successInterval = setInterval(function() {
          if (successProgress > 0) {
              successProgress -= 1;
              successProgressBar.style.width = successProgress + '%';
          } else {
              clearInterval(successInterval); // Stop the progress when it reaches 0%
              setTimeout(function() {
                  successNotification.style.display = 'none'; // Hide the notification after completion
              }, 500); // Wait 500ms for the progress bar to disappear gradually
          }
      }, 30); // Every 30ms, decrease the progress bar by 1%

      // Hide the notification after 5 seconds (along with the progress bar)
      setTimeout(function() {
          if (successProgress > 0) { // If the progress bar is not yet completed
              clearInterval(successInterval); // Stop the progress bar
              successProgressBar.style.width = '0%'; // Set the progress bar to 0%
              successNotification.style.display = 'none'; // Hide the notification
          }
      }, 5000); // 5000 ms = 5 seconds
  }
  /*]]>*/
</script>

<!-- Script for error notification -->
<script th:inline="javascript">
  /*<![CDATA[*/
  var errorMessage = /*[[${errorMessage}]]*/ 'null';
  if (errorMessage !== 'null') {
      var errorNotification = document.getElementById('errorNotification');
      var errorProgressBar = document.getElementById('errorProgress');
      var errorProgress = 100; // Initial value of the progress bar

      // Display the notification
      errorNotification.style.display = 'block';

      // Progress bar decreases from 100% to 0%
      var errorInterval = setInterval(function() {
          if (errorProgress > 0) {
              errorProgress -= 1;
              errorProgressBar.style.width = errorProgress + '%';
          } else {
              clearInterval(errorInterval); // Stop the progress when it reaches 0%
              setTimeout(function() {
                  errorNotification.style.display = 'none'; // Hide the notification after completion
              }, 500); // Wait 500ms for the progress bar to disappear gradually
          }
      }, 30); // Every 30ms, decrease the progress bar by 1%

      // Hide the notification after 5 seconds (along with the progress bar)
      setTimeout(function() {
          if (errorProgress > 0) { // If the progress bar is not yet completed
              clearInterval(errorInterval); // Stop the progress bar
              errorProgressBar.style.width = '0%'; // Set the progress bar to 0%
              errorNotification.style.display = 'none'; // Hide the notification
          }
      }, 5000); // 5000 ms = 5 seconds
  }
  /*]]>*/
</script>

</body>

</html>
