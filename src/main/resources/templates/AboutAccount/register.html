<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" class="no-js">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - TD Mobile</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/register.css" th:href="@{/assets/css/register.css}">
    <script th:src="@{/assets/js/register.js}" src="assets/js/register.js" defer></script>
</head>

<body>
<a href="/" class="back-button"><i class="fas fa-arrow-left"></i> Trang chủ</a>

<!-- Thông báo thất bại với thanh tiến trình -->
<div id="errorNotification" class="alert alert-danger" th:if="${errorMessage}">
    <strong>Thất bại!</strong><br>
    <span th:text="${errorMessage}"></span>
    <div id="errorProgressBar" class="progress mt-2" style="height: 5px;">
        <div id="errorProgress" class="progress-bar bg-danger" role="progressbar" style="width: 100%;"></div>
    </div>
</div>

<div class="regis-box">
    <!-- Logo -->
    <div class="logo">
        <span>TĐ</span><span>Mobile</span>
    </div>

    <h2 class="title">Đăng ký</h2>
    <p>Chào mừng bạn! Hãy điền thông tin để tạo tài khoản mới.</p>
    <form id="addCustomerForm" th:action="@{/register/create-account}" method="post" th:object="${customer}">
        <div class="input-group" th:classappend="${#fields.hasErrors('fullname')} ? 'mb-0'">
            <i class="fas fa-user"></i>
            <input type="text" placeholder="Họ và tên" th:field="*{fullname}" required>
        </div>
        <div th:if="${#fields.hasErrors('fullname')}" class="error text-danger mb-2 text-start">
            <small th:errors="*{fullname}">Lỗi</small>
        </div>

        <div class="input-group" th:classappend="${#fields.hasErrors('email')} ? 'mb-0'">
            <i class="fas fa-envelope"></i>
            <input type="email" placeholder="Email" th:field="*{email}" required>
        </div>
        <div th:if="${#fields.hasErrors('email')}" class="error text-danger mb-2 text-start">
            <small th:errors="*{email}">Lỗi</small>
        </div>

        <div class="input-group" th:classappend="${#fields.hasErrors('phone')} ? 'mb-0'">
            <i class="fas fa-phone"></i>
            <input type="number" placeholder="Số điện thoại" th:field="*{phone}" required>
        </div>
        <div th:if="${#fields.hasErrors('phone')}" class="error text-danger mb-2 text-start">
            <small th:text="${#fields.errors('phone')[0]}">Lỗi</small>
        </div>

        <div class="input-group" th:classappend="${#fields.hasErrors('password')} ? 'mb-0'">
            <i class="fas fa-lock"></i>
            <input type="password" placeholder="Mật khẩu" th:field="*{password}" required>
        </div>
        <div th:if="${#fields.hasErrors('password')}" class="error text-danger mb-2 text-start">
            <small th:errors="*{password}">Lỗi</small>
        </div>

        <div class="input-group" id="confirmPasswordGroup">
            <i class="fas fa-lock"></i>
            <input type="password" placeholder="Xác nhận mật khẩu" id="confirmPassword" required>
        </div>
        <div id="passwordError" style="font-size: 12px; display: none;" class="text-start mb-2 text-danger">
            Mật khẩu và xác nhận mật khẩu không khớp!
        </div>

        <div class="input-group" th:classappend="${#fields.hasErrors('CCCD')} ? 'mb-0'">
            <i class="fas fa-id-card"></i>
            <input type="number" placeholder="Số CCCD" th:field="*{CCCD}" required>
        </div>
        <div th:if="${#fields.hasErrors('CCCD')}" class="error text-danger mb-2 text-start">
            <small th:text="${#fields.errors('CCCD')[0]}">Lỗi</small>
        </div>

        <div class="input-group" th:classappend="${#fields.hasErrors('address')} ? 'mb-0'">
            <i class="fas fa-map-marker-alt"></i>
            <input type="text" placeholder="Địa chỉ" th:field="*{address}" required>
        </div>
        <div th:if="${#fields.hasErrors('address')}" class="error text-danger mb-2 text-start">
            <small th:text="${#fields.errors('address')[0]}">Lỗi</small>
        </div>

        <div class="input-group" th:classappend="${#fields.hasErrors('dob')} ? 'mb-0'">
            <i class="fas fa-calendar-alt"></i>
            <input type="text" placeholder="Ngày sinh" onfocus="(this.type='date')" onblur="(this.type='text')" th:field="*{dob}" required>
        </div>
        <div th:if="${#fields.hasErrors('dob')}" class="error text-danger mb-2 text-start">
            <small th:text="${#fields.errors('dob')[0]}">Lỗi</small>
        </div>

        <div class="input-group" th:classappend="${#fields.hasErrors('gender')} ? 'mb-0'">
            <i class="fas fa-venus-mars"></i>
            <select th:field="*{gender}">
                <option value="" disabled selected>Chọn giới tính</option>
                <option value="Nam">Nam</option>
                <option value="Nữ">Nữ</option>
                <option value="Khác">Khác</option>
            </select>
        </div>
        <div th:if="${#fields.hasErrors('gender')}" class="error text-danger mb-2 text-start">
            <small th:errors="*{gender}">Lỗi</small>
        </div>

        <button type="submit">Đăng ký →</button>
    </form>
    <div class="footer">
        Đã có tài khoản? <a href="/login">Đăng nhập</a>
    </div>
</div>

<!-- Script for error notification -->
<script th:inline="javascript">
    /*<![CDATA[*/
    var errorMessage = /*[[${errorMessage}]]*/ 'null';
    if (errorMessage !== 'null') {
        var errorNotification = document.getElementById('errorNotification');
        var errorProgressBar = document.getElementById('errorProgress');
        var errorProgress = 100; // Initial value of the progress bar

        // Display the notification
        errorNotification.style.display = 'block';

        // Progress bar decreases from 100% to 0%
        var errorInterval = setInterval(function() {
            if (errorProgress > 0) {
                errorProgress -= 1;
                errorProgressBar.style.width = errorProgress + '%';
            } else {
                clearInterval(errorInterval); // Stop the progress when it reaches 0%
                setTimeout(function() {
                    errorNotification.style.display = 'none'; // Hide the notification after completion
                }, 500); // Wait 500ms for the progress bar to disappear gradually
            }
        }, 30); // Every 30ms, decrease the progress bar by 1%

        // Hide the notification after 5 seconds (along with the progress bar)
        setTimeout(function() {
            if (errorProgress > 0) { // If the progress bar is not yet completed
                clearInterval(errorInterval); // Stop the progress bar
                errorProgressBar.style.width = '0%'; // Set the progress bar to 0%
                errorNotification.style.display = 'none'; // Hide the notification
            }
        }, 5000); // 5000 ms = 5 seconds
    }
    /*]]>*/
</script>
</body>

</html>
