<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" class="no-js">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/register.css" th:href="@{/assets/css/register.css}">

</head>

<body>
<a href="/" class="back-button"><i class="fas fa-arrow-left"></i> Trang chủ</a>
<div class="regis-box">
    <!-- Logo -->
    <div class="logo">
        <span>TĐ</span><span>Mobile</span>
    </div>

    <h2 class="title">Đăng ký</h2>
    <p>Chào mừng bạn! Hãy điền thông tin để tạo tài khoản mới.</p>
    <form>
        <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" placeholder="Họ và tên">
        </div>
        <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input type="email" placeholder="Email">
        </div>
        <div class="input-group">
            <i class="fas fa-phone"></i>
            <input type="tel" placeholder="Số điện thoại">
        </div>
        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" placeholder="Mật khẩu">
        </div>
        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" placeholder="Xác nhận mật khẩu">
        </div>
        <div class="input-group">
            <i class="fas fa-id-card"></i>
            <input type="text" placeholder="Số CCCD">
        </div>
        <div class="input-group">
            <i class="fas fa-map-marker-alt"></i>
            <input type="text" placeholder="Địa chỉ">
        </div>
        <div class="input-group">
            <i class="fas fa-calendar-alt"></i>
            <input type="text" placeholder="Ngày sinh" onfocus="(this.type='date')" onblur="(this.type='text')">
        </div>
        <div class="input-group">
            <i class="fas fa-venus-mars"></i>
            <select>
                <option value="" disabled selected>Chọn giới tính</option>
                <option value="Nam">Nam</option>
                <option value="Nữ">Nữ</option>
                <option value="Khác">Khác</option>
            </select>
        </div>
        <button type="submit">Đăng ký →</button>
    </form>
    <div class="footer">
        Đã có tài khoản? <a href="dang-nhap.html">Đăng nhập</a>
    </div>
</div>

</body>

</html>
