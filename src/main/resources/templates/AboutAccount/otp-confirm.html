<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" class="no-js">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác nhận OTP</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/otp-confirm.css" th:href="@{/assets/css/otp-confirm.css}">
    <script th:src="@{/assets/js/otp-confirm.js}" src="assets/js/otp-confirm.js" defer></script>
</head>
<body>
<a href="/" class="back-button"><i class="fas fa-arrow-left"></i> Trang chủ</a>

<!-- Thông báo thất bại với thanh tiến trình -->
<div id="errorNotification" class="alert alert-danger" th:if="${errorMessage}">
    <strong>Thất bại!</strong><br>
    <span th:text="${errorMessage}"></span>
    <div id="errorProgressBar" class="progress mt-2" style="height: 5px;">
        <div id="errorProgress" class="progress-bar bg-danger" role="progressbar" style="width: 100%;"></div>
    </div>
</div>

<!-- Thông báo thất bại với thanh tiến trình, lỗi được gửi từ client (JS)-->
<div id="errorNotificationn" class="alert alert-danger" style="display:none;">
    <strong>Thất bại!</strong><br>
    <span id="errorMessageText"></span>
    <div id="progressBarr" class="progress mt-2" style="height: 5px;">
        <div id="progresss" class="progress-bar bg-danger" role="progressbar" style="width: 100%;"></div>
    </div>
</div>

<div class="otp-container">
    <h2>Xác nhận OTP</h2>
    <p>Mã OTP đã được chúng tôi gửi đến email <br><span class="user-email" th:text="${session.otpEmail}">emailcuaban@example.com</span></p>

    <form th:action="@{/forgot-password/verify-otp}" method="post" id="otp-form" >
        <div class="otp-inputs">
            <input type="number" maxlength="1" name="otp" oninput="this.value=this.value.slice(0,1)">
            <input type="number" maxlength="1" name="otp" oninput="this.value=this.value.slice(0,1)" disabled>
            <input type="number" maxlength="1" name="otp" oninput="this.value=this.value.slice(0,1)" disabled>
            <input type="number" maxlength="1" name="otp" oninput="this.value=this.value.slice(0,1)" disabled>
            <input type="number" maxlength="1" name="otp" oninput="this.value=this.value.slice(0,1)" disabled>
            <input type="number" maxlength="1" name="otp" oninput="this.value=this.value.slice(0,1)" disabled>
        </div>

        <button type="submit" id="submitBtn" disabled>Xác nhận</button>
    </form>
    <div class="resend-link">
        Chưa nhận được mã? <a href="#" id="resendBtn">Gửi lại (<span id="countdown">60</span>s)</a>
    </div>
</div>

<!-- Script for error notification -->
<script th:inline="javascript">
    /*<![CDATA[*/
    var errorMessage = /*[[${errorMessage}]]*/ 'null';
    if (errorMessage !== 'null') {
        var errorNotification = document.getElementById('errorNotification');
        var errorProgressBar = document.getElementById('errorProgress');
        var errorProgress = 100; // Initial value of the progress bar

        // Display the notification
        errorNotification.style.display = 'block';

        // Progress bar decreases from 100% to 0%
        var errorInterval = setInterval(function() {
            if (errorProgress > 0) {
                errorProgress -= 1;
                errorProgressBar.style.width = errorProgress + '%';
            } else {
                clearInterval(errorInterval); // Stop the progress when it reaches 0%
                setTimeout(function() {
                    errorNotification.style.display = 'none'; // Hide the notification after completion
                }, 500); // Wait 500ms for the progress bar to disappear gradually
            }
        }, 30); // Every 30ms, decrease the progress bar by 1%

        // Hide the notification after 5 seconds (along with the progress bar)
        setTimeout(function() {
            if (errorProgress > 0) { // If the progress bar is not yet completed
                clearInterval(errorInterval); // Stop the progress bar
                errorProgressBar.style.width = '0%'; // Set the progress bar to 0%
                errorNotification.style.display = 'none'; // Hide the notification
            }
        }, 5000); // 5000 ms = 5 seconds
    }
    /*]]>*/
</script>
</body>
</html>
