<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" class="no-js">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TD Mobile - Liên hệ</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/font-awesome.min.css" th:href="@{/assets/css/font-awesome.min.css}">
  <link rel="stylesheet" href="assets/css/themify-icons.css" th:href="@{/assets/css/themify-icons.css}">
  <link rel="stylesheet" href="assets/css/styles.css" th:href="@{/assets/css/styles.css}">
  <link rel="stylesheet" href="assets/css/headerSell.css" th:href="@{/assets/css/headerSell.css}">
  <link rel="stylesheet" href="assets/css/footerSell.css" th:href="@{/assets/css/footerSell.css}">
  <link rel="stylesheet" href="assets/css/chat-ai.css" th:href="@{/assets/css/chat-ai.css}">
  <script th:src="@{/assets/js/headerSell.js}" src="assets/js/headerSell.js" defer></script>
  <script th:src="@{/assets/js/chat-ai.js}" defer></script>

  <style>
    .contact-card {
      border-radius: 10px;
      background-color: #f8f9fa;
      transition: transform 0.2s;
    }
    .contact-card:hover {
      transform: translateY(-5px);
      background-color: #eef5ff;
    }
    .contact-section h2 {
      color: #002B5B;
    }
  </style>
</head>
<body>

<!-- Gọi fragment vào file index.html -->
<div th:replace="~{Fragments/Sell/header :: headerSellFragment}"></div>

<div th:replace="~{Fragments/Chat/chat-ai :: chatAI}"></div>

<section class="contact-section py-5">
  <div class="container">
    <div class="text-center mb-5">
      <h2 class="fw-bold text-uppercase">Liên hệ với chúng tôi</h2>
      <p class="text-muted">Chúng tôi luôn sẵn sàng hỗ trợ bạn!</p>
    </div>

    <div class="row text-center gy-4">
      <div class="col-md-4">
        <div class="contact-card p-4 shadow-sm h-100">
          <i class="fas fa-map-marker-alt fa-2x text-primary mb-3"></i>
          <h5 class="fw-bold">Địa chỉ</h5>
          <p>123 Mobile Street, Tech City</p>
        </div>
      </div>

      <div class="col-md-4">
        <div class="contact-card p-4 shadow-sm h-100">
          <i class="fas fa-phone fa-2x text-primary mb-3"></i>
          <h5 class="fw-bold">Điện thoại</h5>
          <p>09876 54321</p>
        </div>
      </div>

      <div class="col-md-4">
        <div class="contact-card p-4 shadow-sm h-100">
          <i class="fas fa-envelope fa-2x text-primary mb-3"></i>
          <h5 class="fw-bold">Email</h5>
          <p>info@tdmobile.com</p>
        </div>
      </div>
    </div>

    <div class="row mt-5">
      <div class="col-md-6 mx-auto text-center">
        <h5 class="fw-bold">Giờ làm việc</h5>
        <p>Thứ Hai - Thứ Bảy: 7:00 - 18:00</p>
        <p>Chủ nhật: 8:00 - 18:00</p>
      </div>
    </div>

    <!-- Optional: Google Map -->
    <!--
    <div class="row mt-5">
      <div class="col">
        <iframe
          src="https://www.google.com/maps/embed?pb=!1m18..."
          width="100%" height="400" style="border:0;" allowfullscreen=""
          loading="lazy" referrerpolicy="no-referrer-when-downgrade">
        </iframe>
      </div>
    </div>
    -->

  </div>
</section>


<div th:replace="~{Fragments/Sell/footer :: footerSellFragment}"></div>
</body>
</html>
